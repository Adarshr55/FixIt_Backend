services:
  db:
    image: postgres:16
    container_name: fixit_db

    environment:
      POSTGRES_DB: fixit_db
      POSTGRES_USER: fixit_user
      POSTGRES_PASSWORD: 1234

    ports:
      - "5434:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: fixit_backend

    command: python manage.py runserver 0.0.0.0:8000

    ports:
      - "8000:8000"

    env_file:
      - .env.docker

    depends_on:
      - db

volumes:
  postgres_data: