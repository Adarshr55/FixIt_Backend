services:

  # ── PostgreSQL with pgvector ─────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg18
    container_name: fixit_db
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5434:5432"        # exposed to host for local DB tools (TablePlus, pgAdmin)
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:  ["CMD-SHELL", "pg_isready -U fixit_user -d fixit_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped


  # ── Redis — Celery broker + Django Channels layer ────────────────────────
  redis:
    image: redis:8.8.0-alpine
    container_name: fixit_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped


  # ── Gunicorn — serves REST API (HTTP) ────────────────────────────────────
  web:
    build: .
    container_name: fixit_web
    command: gunicorn fixit_backend.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 120
      --access-logfile -
      --error-logfile -
    env_file: .env
    expose:
      - "8000" 
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped


  # ── Daphne — serves WebSockets (Django Channels / ASGI) ──────────────────
  daphne:
    build: .
    container_name: fixit_daphne
    command: daphne -b 0.0.0.0 -p 8001 fixit_backend.asgi:application
    environment:
      SKIP_MIGRATIONS: "true"    # web container already ran migrations
    env_file: .env
    expose:
      - "8001"
    volumes:
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped


  # ── Celery Worker — background tasks (fraud check, embeddings etc.) ───────
  celery:
    build: .
    container_name: fixit_celery
    command: celery -A fixit_backend worker --loglevel=info --concurrency=2
    environment:
      SKIP_MIGRATIONS: "true"
    env_file: .env
    volumes:
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped


  # ── Celery Beat — scheduled tasks (nightly fraud scan, ranking signals) ───
  celery_beat:
    build: .
    container_name: fixit_celery_beat
    command: celery -A fixit_backend beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      SKIP_MIGRATIONS: "true"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped


  # ── Nginx — reverse proxy, routes HTTP → gunicorn, WS → daphne ───────────
  nginx:
    image: nginx:alpine
    container_name: fixit_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

