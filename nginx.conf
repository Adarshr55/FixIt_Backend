limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

upstream django_web {
    server web:8000;
}

upstream django_ws {
    server daphne:8001;
}

# ── Redirect all HTTP to HTTPS ────────────────────────────────────────────
server {
    listen 80;
    server_name fixit-app.duckdns.org;
    return 301 https://$host$request_uri;
}

# ── Main server block — HTTPS ─────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name fixit-app.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/fixit-app.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fixit-app.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;   # for file uploads (provider documents, photos)

    add_header X-Frame-Options      "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"   always;
    add_header X-XSS-Protection     "1; mode=block" always;

    # ── Gzip compression ─────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain application/json application/javascript
                    text/css text/xml application/xml;
    gzip_min_length 1000;
    gzip_vary       on;

    # ── Static files — served directly by Nginx (no Django involved) ─────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Media files — provider photos, documents ─────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # ── WebSocket connections → Daphne ───────────────────────────────────
    # Matches: /ws/notifications/, /ws/location/
    location /ws/ {
        proxy_pass http://django_ws;

        # Required headers for WebSocket upgrade
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;    # keep WS connections alive (24h)
    }

    # ── All other requests → Gunicorn (REST API) ─────────────────────────
    location / {
        proxy_pass http://django_web;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
    }
}