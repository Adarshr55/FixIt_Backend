name: Deploy FixIt to AWS EC2


on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          timeout:  300s
          script: |
            echo "=== Pulling latest code ==="
            cd FixIt_Backend
            git pull origin main

            echo "=== Rebuilding containers ==="
            docker compose build web daphne celery celery_beat

            echo "=== Restarting updated containers ==="
            docker compose up -d --no-deps web daphne celery celery_beat

            echo "=== Running migrations ==="
            docker compose exec -T web python manage.py migrate --noinput

            echo "=== Seeding embeddings for new categories ==="
            docker compose exec -T web python manage.py seed_embeddings --type categories || true

            echo "=== Checking all containers ==="
            docker compose ps

            echo "=== Deployment complete ==="

